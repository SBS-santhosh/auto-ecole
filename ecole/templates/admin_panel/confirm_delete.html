{% extends 'base.html' %}

{% block title %}Confirmer la suppression — AutoÉcole Pro{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-body text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                <h4 class="mt-3 fw-bold">Confirmer la suppression</h4>
                <p class="text-muted">Voulez-vous vraiment supprimer <strong>{{ objet }}</strong> ?</p>
                <p class="text-danger small">Cette action est irréversible.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <a href="{% url back_url %}" class="btn btn-outline-secondary px-4">Annuler</a>
                        <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-2"></i>Supprimer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
