{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Créer un créneau — AutoÉcole Pro{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-plus-circle"></i> Créer un créneau de leçon</h2>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-2"></i>Créer</button>
                        <a href="{% url 'moniteur_planning' %}" class="btn btn-outline-secondary">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
