{% extends 'base.html' %}

{% block title %}Connexion — AutoÉcole Pro{% endblock %}

{% block public_content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-car-front-fill" style="font-size: 2.5rem; color: var(--primary);"></i>
            <h2 class="mt-2">Connexion</h2>
            <p class="auth-subtitle">Accédez à votre espace personnel</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Nom d'utilisateur</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Votre identifiant" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Votre mot de passe" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
            </button>
        </form>
        <p class="text-center mt-3 text-muted">
            Pas encore de compte ? <a href="{% url 'inscription' %}">S'inscrire</a>
        </p>
    </div>
</div>
{% endblock %}
